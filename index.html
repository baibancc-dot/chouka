<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <!-- 程序名称：开面 -->
    <title>开面</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; touch-action: none; }
        body { background: #000; overflow: hidden; font-family: "Microsoft YaHei", "PingFang SC", sans-serif; color: #fff; width: 100vw; height: 100vh; }
        
        /* 视频：PC隐藏，手机小窗口预览 */
        #input_video { 
            position: fixed; bottom: 15px; right: 15px; width: 85px; height: 115px; 
            border: 1px solid gold; border-radius: 8px; z-index: 1000; transform: scaleX(-1);
            background: #111; object-fit: cover; display: none;
        }

        #star-bg { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -1; }

        /* 状态指示 */
        #status-info {
            position: fixed; top: 16px; right: 16px; background: rgba(0,0,0,0.6);
            padding: 8px 12px; border-radius: 5px; font-size: 12px; color: #0f0; z-index: 1001;
        }

        /* 手部光标 */
        #handCursor {
            position: fixed; width: 22px; height: 22px; border-radius: 50%;
            background: rgba(255,215,0,0.8); box-shadow: 0 0 15px gold;
            pointer-events: none; z-index: 9999; transform: translate(-50%, -50%);
            border: 2px solid #fff; transition: width 0.2s, height 0.2s, background 0.2s;
        }

        /* 跑马灯盒 */
        .marquee-box {
            position: absolute; top: 50%; left: 0; width: 100%; height: 350px;
            transform: translateY(-50%); display: flex; align-items: center; 
            overflow: visible; 
        }
        .marquee-track {
            display: flex; gap: 50px; animation: marquee 35s linear infinite; padding: 0 100px;
        }
        .track-paused { animation-play-state: paused !important; }

        @keyframes marquee {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }

        /* 卡牌基础样式 (PC端 160x260) */
        .tarot-card {
            width: 160px; height: 260px; position: relative; flex-shrink: 0;
            transform-style: preserve-3d; border-radius: 12px;
            transition: transform 0.15s linear;
        }

        /* 手机端尺寸适配 */
        @media (max-width: 768px) {
            .tarot-card { width: 105px; height: 170px; }
            .marquee-box { height: 240px; }
            .marquee-track { gap: 20px; }
            #input_video { display: block; }
            .tip { font-size: 12px !important; bottom: 20px !important; padding: 12px 20px !important; }
        }

        .card-front, .card-back {
            position: absolute; width: 100%; height: 100%; backface-visibility: hidden;
            border-radius: 10px; display: flex; align-items: center; justify-content: center;
            border: 2px solid gold; background-repeat: no-repeat; background-color: #1a1a2e;
            background-size: 100% 100%; 
            background-position: center;
            font-weight: bold;
            color: gold;
            letter-spacing: 4px;
        }
        .card-front { transform: rotateY(180deg); border-color: #fff; color: #fff; }
        
        /* 瞄准与选中状态 */
        .card-aimed { transform: scale(1.15); box-shadow: 0 0 30px gold; z-index: 10; }
        .selected-top { z-index: 1000 !important; }

        /* 底部提示 */
        .tip {
            position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.8); padding: 15px 30px; border-radius: 40px;
            color: gold; font-size: 14px; border: 1px solid gold; z-index: 20; 
            text-align: center; width: 85%; max-width: 550px; line-height: 1.6;
            pointer-events: none;
        }
    </style>
</head>
<body>

<video id="input_video" playsinline autoplay muted></video>
<div id="star-bg"></div>
<div id="handCursor"></div>
<div id="status-info">系统初始化...</div>

<div class="marquee-box" id="marqueeBox">
    <div class="marquee-track" id="track"></div>
</div>

<div class="tip">
    👌 <b>捏合</b> 进行“开面” <br>
    ↔️ <b>向后拉远手掌</b> 放大观察 | 🖐️ <b>张开五指</b> 重置归位
</div>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.150.0/build/three.min.js"></script>

<script>
    const isMobile = /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
    
    // 图片配置
    const CONFIG = {
        cardBack: "images/back.jpg",
        cards: [
            "images/card1.jpg", "images/card2.jpg", "images/card3.jpg", "images/card4.jpg",
            "images/card5.jpg", "images/card6.jpg", "images/card7.jpg", "images/card8.jpg"
        ]
    };

    const track = document.getElementById('track');
    const cursor = document.getElementById('handCursor');
    const statusInfo = document.getElementById('status-info');
    const videoElement = document.getElementById('input_video');

    function buildMarquee() {
        const items = CONFIG.cards.map((img, i) => `
            <div class="tarot-card" data-idx="${i}">
                <div class="card-back" style="background-image: url('${CONFIG.cardBack}')">${img ? '' : '开面'}</div>
                <div class="card-front" style="background-image: url('${img}')"></div>
            </div>
        `).join('');
        // 渲染 3 份保证循环流畅感
        track.innerHTML = items + items + items;
    }
    buildMarquee();

    const hands = new Hands({
        locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
    });

    hands.setOptions({
        maxNumHands: 1,
        modelComplexity: isMobile ? 0 : 1,
        minDetectionConfidence: 0.7,
        minTrackingConfidence: 0.7
    });

    let selectedCard = null;
    let isPinching = false;
    let baseHandSize = 0; 

    hands.onResults(results => {
        if (!results.multiHandLandmarks || results.multiHandLandmarks.length === 0) {
            statusInfo.innerText = "等待识别";
            return;
        }
        statusInfo.innerText = "就绪";
        const lm = results.multiHandLandmarks[0];
        
        const cx = (1 - lm[8].x) * window.innerWidth;
        const cy = lm[8].y * window.innerHeight;
        cursor.style.left = `${cx}px`;
        cursor.style.top = `${cy}px`;

        const currentHandSize = Math.hypot(lm[0].x - lm[5].x, lm[0].y - lm[5].y);
        
        let hovered = null;
        if (!selectedCard) {
            const cards = document.querySelectorAll('.tarot-card');
            cards.forEach(card => {
                const r = card.getBoundingClientRect();
                const inside = (cx > r.left && cx < r.right && cy > r.top && cy < r.bottom);
                
                if (inside) {
                    hovered = card;
                    card.classList.add('card-aimed');
                    cursor.style.width = '45px'; cursor.style.height = '45px';
                } else {
                    card.classList.remove('card-aimed');
                }
            });
            if (!hovered) { cursor.style.width = '22px'; cursor.style.height = '22px'; }
        }

        const pinchDist = Math.hypot(lm[8].x - lm[4].x, lm[8].y - lm[4].y); 
        const palmOpenDist = Math.hypot(lm[8].x - lm[0].x, lm[8].y - lm[0].y);

        if (pinchDist < 0.045) {
            if (!isPinching) {
                isPinching = true;
                baseHandSize = currentHandSize;
                
                if (hovered && !selectedCard) {
                    selectedCard = hovered;
                    selectedCard.classList.add('selected-top');
                    track.classList.add('track-paused'); 
                }
            }

            if (selectedCard) {
                let ratio = baseHandSize / currentHandSize;
                let targetScale = 1.3 + (ratio - 1) * 3.5;
                targetScale = Math.max(1.3, Math.min(targetScale, 4.8));

                selectedCard.style.transform = `rotateY(180deg) scale(${targetScale})`;
                cursor.style.background = "lime";
            }
        } else {
            isPinching = false;
            if (selectedCard) {
                selectedCard.style.transform = `rotateY(180deg) scale(1.3)`;
                cursor.style.background = "rgba(255,215,0,0.8)";
            }
        }

        if (palmOpenDist > 0.35 && selectedCard) {
            selectedCard.classList.remove('selected-top');
            selectedCard.style.transform = "rotateY(0deg) scale(1)";
            selectedCard = null;
            track.classList.remove('track-paused');
            cursor.style.background = "rgba(255,215,0,0.8)";
        }
    });

    const camera = new Camera(videoElement, {
        onFrame: async () => { await hands.send({image: videoElement}); },
        width: isMobile ? 320 : 640,
        height: isMobile ? 480 : 480
    });
    camera.start();

    // 背景渲染
    const scene = new THREE.Scene();
    const cam = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 100);
    const renderer = new THREE.WebGLRenderer({ alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.getElementById('star-bg').appendChild(renderer.domElement);
    const starGeo = new THREE.BufferGeometry();
    const pos = [];
    const starCount = isMobile ? 800 : 2500;
    for(let i=0; i<starCount; i++) pos.push((Math.random()-0.5)*40, (Math.random()-0.5)*40, (Math.random()-0.5)*40);
    starGeo.setAttribute('position', new THREE.Float32BufferAttribute(pos, 3));
    const starMesh = new THREE.Points(starGeo, new THREE.PointsMaterial({ color: 0xffffff, size: 0.015 }));
    scene.add(starMesh);
    cam.position.z = 5;
    function animate() { requestAnimationFrame(animate); starMesh.rotation.y += 0.0006; renderer.render(scene, cam); }
    animate();

    window.onresize = () => {
        cam.aspect = window.innerWidth / window.innerHeight;
        cam.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    };
</script>
</body>
</html>
