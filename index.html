<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>塔罗拉远 - 手机极速版</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; touch-action: none; }
        body { background: #000; overflow: hidden; font-family: sans-serif; width: 100vw; height: 100vh; }
        
        /* 关键：给视频流留一个小窗口，方便用户看到手是否进画面，提高成功率 */
        #input_video { 
            position: fixed; bottom: 10px; right: 10px; width: 80px; height: 60px; 
            border: 1px solid gold; border-radius: 4px; z-index: 1000; transform: scaleX(-1);
            background: #222;
        }

        #star-bg { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -1; }

        /* 状态指示 */
        #status-info {
            position: fixed; top: 10px; left: 10px; background: rgba(0,0,0,0.7);
            padding: 5px 10px; border-radius: 5px; font-size: 10px; color: #0f0; z-index: 1001;
        }

        #handCursor {
            position: fixed; width: 15px; height: 15px; border-radius: 50%;
            background: gold; box-shadow: 0 0 10px gold;
            pointer-events: none; z-index: 9999; transform: translate(-50%, -50%);
            border: 1.5px solid #fff;
        }

        .marquee-box {
            position: absolute; top: 40%; left: 0; width: 100%; height: 220px;
            transform: translateY(-50%); display: flex; align-items: center; overflow: visible;
        }
        .marquee-track {
            display: flex; gap: 20px; animation: marquee 20s linear infinite; padding: 0 50px;
        }
        .track-paused { animation-play-state: paused !important; }

        @keyframes marquee {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }

        .tarot-card {
            width: 90px; height: 150px; position: relative; flex-shrink: 0;
            transform-style: preserve-3d; border-radius: 8px; transition: transform 0.1s linear;
        }
        .card-front, .card-back {
            position: absolute; width: 100%; height: 100%; backface-visibility: hidden;
            border-radius: 8px; border: 1.5px solid gold; background-repeat: no-repeat;
            background-color: #1a1a2e; background-size: 100% 100%; background-position: center;
        }
        .card-front { transform: rotateY(180deg); border-color: #fff; }
        .selected-top { z-index: 1000 !important; }

        .tip {
            position: absolute; bottom: 80px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.8); padding: 12px 20px; border-radius: 20px;
            color: gold; font-size: 12px; border: 1px solid gold; z-index: 20;
            text-align: center; width: 85%; pointer-events: none;
        }
    </style>
</head>
<body>

<!-- 手机端必须显式添加 playsinline 和 autoplay -->
<video id="input_video" playsinline autoplay muted></video>
<div id="star-bg"></div>
<div id="handCursor"></div>
<div id="status-info">正在加载图片...</div>

<div class="marquee-box">
    <div class="marquee-track" id="track"></div>
</div>

<div class="tip">
    1. 确保右下角小窗口能看到手 <br>
    2. 👌 <b>捏合</b>并<b>拉远手掌</b>放大观察 <br>
    3. 🖐️ <b>张开五指</b> 重置
</div>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.150.0/build/three.min.js"></script>

<script>
    // 强制使用绝对路径防止手机端路径解析错误
    const baseUrl = window.location.href.substring(0, window.location.href.lastIndexOf("/") + 1);
    const CONFIG = {
        cardBack: baseUrl + "images/back.jpg",
        cards: [
            baseUrl + "images/card1.jpg", baseUrl + "images/card2.jpg", baseUrl + "images/card3.jpg", baseUrl + "images/card4.jpg",
            baseUrl + "images/card5.jpg", baseUrl + "images/card6.jpg", baseUrl + "images/card7.jpg", baseUrl + "images/card8.jpg"
        ]
    };

    const track = document.getElementById('track');
    const cursor = document.getElementById('handCursor');
    const statusInfo = document.getElementById('status-info');

    function buildMarquee() {
        const items = CONFIG.cards.map((img, i) => `
            <div class="tarot-card" data-idx="${i}">
                <div class="card-back" style="background-image: url('${CONFIG.cardBack}')"></div>
                <div class="card-front" style="background-image: url('${img}')"></div>
            </div>
        `).join('');
        track.innerHTML = items + items; // 减少一倍以减轻DOM压力
    }
    buildMarquee();

    const hands = new Hands({
        locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
    });

    // 性能优化核心配置
    hands.setOptions({
        maxNumHands: 1,
        modelComplexity: 0, // 最快模型
        minDetectionConfidence: 0.5, // 降低阈值提高响应
        minTrackingConfidence: 0.5
    });

    let selectedCard = null;
    let isPinching = false;
    let baseHandSize = 0;

    hands.onResults(results => {
        if (!results.multiHandLandmarks?.length) {
            statusInfo.innerText = "未识别到手";
            return;
        }
        statusInfo.innerText = "识别正常";
        const lm = results.multiHandLandmarks[0];
        
        const cx = (1 - lm[8].x) * window.innerWidth;
        const cy = lm[8].y * window.innerHeight;
        cursor.style.left = `${cx}px`;
        cursor.style.top = `${cy}px`;

        const currentHandSize = Math.hypot(lm[2].x - lm[17].x, lm[2].y - lm[17].y);
        
        if (!selectedCard) {
            document.querySelectorAll('.tarot-card').forEach(card => {
                const r = card.getBoundingClientRect();
                if (cx > r.left && cx < r.right && cy > r.top && cy < r.bottom) {
                    card.style.transform = "scale(1.1)";
                    window.hovered = card;
                } else {
                    card.style.transform = "";
                }
            });
        }

        const pinchDist = Math.hypot(lm[8].x - lm[4].x, lm[8].y - lm[4].y); 
        const palmOpenDist = Math.hypot(lm[8].x - lm[0].x, lm[8].y - lm[0].y);

        if (pinchDist < 0.06) {
            if (!isPinching) {
                isPinching = true;
                baseHandSize = currentHandSize;
                if (window.hovered && !selectedCard) {
                    selectedCard = window.hovered;
                    selectedCard.classList.add('selected-top');
                    track.classList.add('track-paused');
                }
            }
            if (selectedCard) {
                let ratio = baseHandSize / currentHandSize;
                let scale = 1.3 + (ratio - 1) * 3.0;
                scale = Math.min(Math.max(scale, 1.3), 4.0);
                selectedCard.style.transform = `rotateY(180deg) scale(${scale})`;
            }
        } else {
            isPinching = false;
        }

        if (palmOpenDist > 0.3 && selectedCard) {
            selectedCard.classList.remove('selected-top');
            selectedCard.style.transform = "";
            selectedCard = null;
            track.classList.remove('track-paused');
        }
    });

    // 针对手机端优化的摄像头调用
    const videoElement = document.getElementById('input_video');
    const camera = new Camera(videoElement, {
        onFrame: async () => {
            await hands.send({image: videoElement});
        },
        width: 320, // 降低采集分辨率显著提升帧率
        height: 240
    });
    camera.start();

    // 极致简化的 Three.js 背景
    const scene = new THREE.Scene();
    const cam = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 100);
    const renderer = new THREE.WebGLRenderer({ alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.getElementById('star-bg').appendChild(renderer.domElement);
    const starGeo = new THREE.BufferGeometry();
    const pos = [];
    for(let i=0; i<800; i++) pos.push((Math.random()-0.5)*40, (Math.random()-0.5)*40, (Math.random()-0.5)*40);
    starGeo.setAttribute('position', new THREE.Float32BufferAttribute(pos, 3));
    const starMesh = new THREE.Points(starGeo, new THREE.PointsMaterial({ color: 0xffffff, size: 0.1 }));
    scene.add(starMesh);
    cam.position.z = 5;
    function animate() { requestAnimationFrame(animate); starMesh.rotation.y += 0.001; renderer.render(scene, cam); }
    animate();
</script>
</body>
</html>
