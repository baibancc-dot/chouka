<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>塔罗拉远 - 手机最终适配版</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; touch-action: none; }
        body { background: #000; overflow: hidden; font-family: sans-serif; width: 100vw; height: 100vh; }
        
        /* 视频小窗口 */
        #input_video { 
            position: fixed; bottom: 10px; right: 10px; width: 70px; height: 90px; 
            border: 1px solid gold; border-radius: 4px; z-index: 1000; transform: scaleX(-1);
            background: #222; object-fit: cover;
        }

        #star-bg { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -1; }

        #status-info {
            position: fixed; top: 10px; left: 10px; background: rgba(0,0,0,0.7);
            padding: 5px 10px; border-radius: 5px; font-size: 10px; color: #0f0; z-index: 1001;
        }

        #handCursor {
            position: fixed; width: 15px; height: 15px; border-radius: 50%;
            background: gold; box-shadow: 0 0 10px gold;
            pointer-events: none; z-index: 9999; transform: translate(-50%, -50%);
            border: 1.5px solid #fff;
        }

        .marquee-box {
            position: absolute; top: 40%; left: 0; width: 100%; height: 200px;
            transform: translateY(-50%); display: flex; align-items: center; overflow: visible;
        }
        .marquee-track {
            display: flex; gap: 15px; animation: marquee 20s linear infinite; padding: 0 30px;
        }
        .track-paused { animation-play-state: paused !important; }

        @keyframes marquee {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }

        .tarot-card {
            width: 85px; height: 140px; position: relative; flex-shrink: 0;
            transform-style: preserve-3d; border-radius: 8px; transition: transform 0.1s linear;
        }
        .card-front, .card-back {
            position: absolute; width: 100%; height: 100%; backface-visibility: hidden;
            border-radius: 8px; border: 1.5px solid gold; 
            background-repeat: no-repeat; background-position: center;
            background-size: 100% 100%;
            background-color: #1a1a2e; /* 如果图不显示，会显示深蓝色 */
        }
        .card-front { transform: rotateY(180deg); border-color: #fff; }
        .selected-top { z-index: 1000 !important; }

        .tip {
            position: absolute; bottom: 110px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.8); padding: 12px 20px; border-radius: 20px;
            color: gold; font-size: 11px; border: 1px solid gold; z-index: 20;
            text-align: center; width: 85%; pointer-events: none; line-height: 1.6;
        }
    </style>
</head>
<body>

<video id="input_video" playsinline autoplay muted></video>
<div id="star-bg"></div>
<div id="handCursor"></div>
<div id="status-info">正在检查资源...</div>

<div class="marquee-box">
    <div class="marquee-track" id="track"></div>
</div>

<div class="tip">
    <b>手机模式已启用</b> <br>
    👌 捏合翻牌 + ↔️ 手向后撤放大观察 <br>
    🖐️ 张开五指重置
</div>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.150.0/build/three.min.js"></script>

<script>
    // 自动修正 GitHub 二级目录路径
    const pathArray = window.location.pathname.split('/');
    const repoName = pathArray[1]; // 获取仓库名
    const rootPath = window.location.origin + '/' + repoName + '/';

    const CONFIG = {
        cardBack: 'images/back.jpg',
        cards: [
            'images/card1.jpg', 'images/card2.jpg', 'images/card3.jpg', 'images/card4.jpg',
            'images/card5.jpg', 'images/card6.jpg', 'images/card7.jpg', 'images/card8.jpg'
        ]
    };

    const track = document.getElementById('track');
    const cursor = document.getElementById('handCursor');
    const statusInfo = document.getElementById('status-info');

    function buildMarquee() {
        // 使用相对路径，浏览器会自动补全
        const items = CONFIG.cards.map((img, i) => `
            <div class="tarot-card" data-idx="${i}">
                <div class="card-back" style="background-image: url('${CONFIG.cardBack}')"></div>
                <div class="card-front" style="background-image: url('${img}')"></div>
            </div>
        `).join('');
        track.innerHTML = items + items;
    }
    buildMarquee();

    const hands = new Hands({
        locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
    });

    hands.setOptions({
        maxNumHands: 1,
        modelComplexity: 0,
        minDetectionConfidence: 0.5,
        minTrackingConfidence: 0.5
    });

    let selectedCard = null;
    let isPinching = false;
    let baseHandSize = 0;

    hands.onResults(results => {
        if (!results.multiHandLandmarks?.length) {
            statusInfo.innerText = "等待手部进入视野";
            return;
        }
        statusInfo.innerText = "识别正常";
        const lm = results.multiHandLandmarks[0];
        
        const cx = (1 - lm[8].x) * window.innerWidth;
        const cy = lm[8].y * window.innerHeight;
        cursor.style.left = cx + 'px';
        cursor.style.top = cy + 'px';

        const currentHandSize = Math.hypot(lm[2].x - lm[17].x, lm[2].y - lm[17].y);
        
        if (!selectedCard) {
            document.querySelectorAll('.tarot-card').forEach(card => {
                const r = card.getBoundingClientRect();
                if (cx > r.left && cx < r.right && cy > r.top && cy < r.bottom) {
                    card.style.transform = "scale(1.1)";
                    window.hovered = card;
                } else {
                    card.style.transform = "";
                }
            });
        }

        const pinchDist = Math.hypot(lm[8].x - lm[4].x, lm[8].y - lm[4].y); 
        const palmOpenDist = Math.hypot(lm[8].x - lm[0].x, lm[8].y - lm[0].y);

        if (pinchDist < 0.06) {
            if (!isPinching) {
                isPinching = true;
                baseHandSize = currentHandSize;
                if (window.hovered && !selectedCard) {
                    selectedCard = window.hovered;
                    selectedCard.classList.add('selected-top');
                    track.classList.add('track-paused');
                }
            }
            if (selectedCard) {
                let ratio = baseHandSize / currentHandSize;
                let scale = 1.3 + (ratio - 1) * 3.5;
                scale = Math.min(Math.max(scale, 1.3), 4.5);
                selectedCard.style.transform = `rotateY(180deg) scale(${scale})`;
            }
        } else {
            isPinching = false;
        }

        if (palmOpenDist > 0.3 && selectedCard) {
            selectedCard.classList.remove('selected-top');
            selectedCard.style.transform = "";
            selectedCard = null;
            track.classList.remove('track-paused');
        }
    });

    const videoElement = document.getElementById('input_video');
    const camera = new Camera(videoElement, {
        onFrame: async () => {
            await hands.send({image: videoElement});
        },
        width: 320,
        height: 480
    });
    camera.start();

    // 简化背景
    const scene = new THREE.Scene();
    const cam = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 100);
    const renderer = new THREE.WebGLRenderer({ alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.getElementById('star-bg').appendChild(renderer.domElement);
    const starGeo = new THREE.BufferGeometry();
    const pos = [];
    for(let i=0; i<500; i++) pos.push((Math.random()-0.5)*40, (Math.random()-0.5)*40, (Math.random()-0.5)*40);
    starGeo.setAttribute('position', new THREE.Float32BufferAttribute(pos, 3));
    const starMesh = new THREE.Points(starGeo, new THREE.PointsMaterial({ color: 0xffffff, size: 0.1 }));
    scene.add(starMesh);
    cam.position.z = 5;
    function animate() { requestAnimationFrame(animate); starMesh.rotation.y += 0.001; renderer.render(scene, cam); }
    animate();
</script>
</body>
</html>
